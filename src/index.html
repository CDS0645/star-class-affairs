/* ===== Data Sync Module ===== */
const DataSync = {
  // 云端服务器地址（从localStorage加载，可配置）
  serverUrl: localStorage.getItem('p3_server_url') || 'http://localhost:3000',
  autoSync: localStorage.getItem('p3_auto_sync') === 'true',

  // 获取当前班级ID
  getClassId: function() {
    return Classes.getConfig().id;
  },

  // 同步考勤数据到云端
  syncAttendance: async function() {
    try {
      const key = S.currentDate + '_' + S.currentPeriod;
      const records = S.attendanceRecords[key] || {};

      const response = await fetch(this.serverUrl + '/api/attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          class_id: this.getClassId(),
          key: key,
          date: S.currentDate,
          period: S.currentPeriod,
          records: records
        })
      });

      const result = await response.json();
      if (result.success) {
        console.log('✅ 考勤数据已同步到云端');
        toast('☁️ 考勤已同步');
      }
    } catch (e) {
      console.log('⚠️ 同步失败，数据已保存到本地:', e.message);
    }
  },

  // 同步请假数据到云端
  syncLeaves: async function() {
    try {
      const todayLeaves = S.leaveRecords.filter(r => r.startDate === S.currentDate);

      for (const leave of todayLeaves) {
        const src = (leave.source === 'paste' || leave.source === 'manual') ? 'p1' : leave.source;
        await fetch(this.serverUrl + '/api/leaves', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            class_id: this.getClassId(),
            student_no: leave.studentNo,
            student_name: leave.studentName,
            type: leave.type,
            start_date: leave.startDate,
            periods: leave.periods,
            reason: leave.reason || '',
            status: leave.status,
            source: src
          })
        });
      }

      console.log('✅ 请假数据已同步到云端');
    } catch (e) {
      console.log('⚠️ 请假同步失败:', e.message);
    }
  },

  // 从云端拉取最新数据
  pullFromCloud: async function() {
    try {
      const classId = this.getClassId();
      const response = await fetch(this.serverUrl + '/api/leaves?class_id=' + encodeURIComponent(classId));
      const cloudLeaves = await response.json();

      // 合并云端请假记录（避免重复）
      cloudLeaves.forEach(cloudLeave => {
        const exists = S.leaveRecords.some(l => l.id === cloudLeave.id);
        if (!exists) {
          S.leaveRecords.push(cloudLeave);
          // 自动同步考勤状态
          if(!S.rosterState[S.currentPeriod])S.rosterState[S.currentPeriod]={};
          S.rosterState[S.currentPeriod][cloudLeave.studentNo] = 'leave';
        }
      });

      console.log('✅ 已从云端拉取最新数据');
      toast('☁️ 数据已同步');
      renderRoster();
    } catch (e) {
      console.log('⚠️ 拉取失败:', e.message);
    }
  },

  // 测试服务器连接
  testConnection: async function() {
    try {
      const response = await fetch(this.serverUrl + '/api/health');
      const data = await response.json();
      return { ok: data.status === 'ok', data: data };
    } catch (e) {
      return { ok: false, error: e.message };
    }
  },

  // 从P3拉取配置（学校/班级名称）
  pullConfig: async function() {
    try {
      const classId = this.getClassId();
      const response = await fetch(this.serverUrl + '/api/classes/' + encodeURIComponent(classId));
      const data = await response.json();
      if (data && data.name) {
        console.log('✅ 从P3拉取配置:', data);
        return data;
      }
    } catch (e) {
      console.log('⚠️ 拉取配置失败:', e.message);
    }
    return null;
  },

  // 定时同步（每30秒）
  startAutoSync: function() {
    if (this._autoSyncTimer) clearInterval(this._autoSyncTimer);
    this._autoSyncTimer = setInterval(() => {
      this.syncAttendance();
      this.syncLeaves();
    }, 30000);
    this.autoSync = true;
    localStorage.setItem('p3_auto_sync', 'true');
    console.log('⏱️ 自动同步已启动（每30秒）');
    toast('⏱️ 自动同步已开启');
  },

  stopAutoSync: function() {
    if (this._autoSyncTimer) {
      clearInterval(this._autoSyncTimer);
      this._autoSyncTimer = null;
    }
    this.autoSync = false;
    localStorage.setItem('p3_auto_sync', 'false');
    console.log('⏱️ 自动同步已停止');
    toast('⏱️ 自动同步已关闭');
  },

  // 触发自动同步（如果启用）
  triggerAutoSync: function() {
    if (this.autoSync) {
      this.syncAttendance();
      this.syncLeaves();
    }
  },

  // 导出完整数据
  exportFullData: function() {
    return {
      exportTime: new Date().toISOString(),
      version: 'v21',
      classInfo: Classes.getConfig().name,
      school: Classes.getConfig().school,
      date: S.currentDate,
      period: S.currentPeriod,
      students: students,
      attendance: S.attendanceRecords,
      leaves: S.leaveRecords,
      rosterState: S.rosterState,
      callCounts: S.callCounts
    };
  }
};

  html += '<div style="margin-bottom:16px;display:flex;align-items:center;gap:8px">';
  html += '<label style="font-size:13px;color:var(--text2)">自动同步</label>';
  html += '<input type="checkbox" id="cloudAutoSync" ' + (savedAutoSync ? 'checked' : '') + ' style="width:18px;height:18px;cursor:pointer;">';
  html += '<span id="cloudAutoSyncLabel" style="font-size:12px;color:var(--text3)">' + (savedAutoSync ? '已开启' : '已关闭') + '</span></div>';
  html += '<div id="cloudStatus" style="margin-bottom:16px;padding:8px 12px;border-radius:8px;background:var(--elevated);font-size:13px;color:var(--text2)">点击"测试连接"检查服务器状态</div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  html += '<button id="cloudTestBtn" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--blue);color:#fff;cursor:pointer;font-size:14px;">🔗 测试连接</button>';
  html += '<button id="cloudSaveBtn" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--green);color:#fff;cursor:pointer;font-size:14px;">💾 保存设置</button>';
  html += '<button id="cloudSyncNowBtn" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--gold);color:#fff;cursor:pointer;font-size:14px;">🔄 立即同步</button>';
  html += '</div>';
  html += '<div style="margin-top:8px;text-align:center"><button onclick="this.closest(\'div[style*=fixed]\').remove()" style="padding:6px 20px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;font-size:13px">关闭</button></div>';

  box.innerHTML = html;
  overlay.appendChild(box);
  overlay.onclick = function(e) { if (e.target === this) this.remove(); };
  document.body.appendChild(overlay);

  // Auto-sync label toggle
  document.getElementById('cloudAutoSync').onchange = function() {
    document.getElementById('cloudAutoSyncLabel').textContent = this.checked ? '已开启' : '已关闭';
  };

  // Test connection
  document.getElementById('cloudTestBtn').onclick = async function() {
    const statusEl = document.getElementById('cloudStatus');
    statusEl.textContent = '⏳ 正在连接...';
    statusEl.style.color = 'var(--text2)';
    const url = document.getElementById('cloudServerUrl').value.trim();
    DataSync.serverUrl = url;
    const result = await DataSync.testConnection();
    if (result.ok) {
      statusEl.textContent = '✅ 连接成功！服务器正常运行';
      statusEl.style.color = 'var(--green)';
    } else {
      statusEl.textContent = '❌ 连接失败: ' + (result.error || '未知错误');
      statusEl.style.color = 'var(--coral)';
    }
  };

  // Save settings
  document.getElementById('cloudSaveBtn').onclick = function() {
    const url = document.getElementById('cloudServerUrl').value.trim();
    const autoSync = document.getElementById('cloudAutoSync').checked;
    localStorage.setItem('p3_server_url', url);
    DataSync.serverUrl = url;
    if (autoSync) {
      DataSync.startAutoSync();
    } else {
      DataSync.stopAutoSync();
    }
    toast('✅ 云端同步设置已保存');
  };

  // Sync now
  document.getElementById('cloudSyncNowBtn').onclick = async function() {
    const statusEl = document.getElementById('cloudStatus');
    statusEl.textContent = '⏳ 正在同步...';
    statusEl.style.color = 'var(--text2)';
    try {
      DataSync.serverUrl = document.getElementById('cloudServerUrl').value.trim();
      await DataSync.syncAttendance();
      await DataSync.syncLeaves();
      await DataSync.pullFromCloud();
      statusEl.textContent = '✅ 同步完成！';
      statusEl.style.color = 'var(--green)';
    } catch (e) {
      statusEl.textContent = '❌ 同步失败: ' + e.message;
      statusEl.style.color = 'var(--coral)';
    }
  };
}

}

// 暴露CLI对象给AI和外部工具
window.StarClass = {
  // 版本信息
  version: 'v20',
  
  // 获取今日考勤概况
  getTodayAttendance: function() {
    const date = S.currentDate;
    const records = {};
    Object.keys(S.attendanceRecords).forEach(key => {
      if (key.startsWith(date)) {
        const period = key.split('_')[1];
        records[period] = S.attendanceRecords[key];
      }
    });
    return {
      date: date,
      totalStudents: students.length,
      periods: records,
      leaveRecords: S.leaveRecords.filter(r => r.startDate === date),
      rosterState: S.rosterState
    };
  },
  
  // 获取学生列表
  getStudents: function() {
    return students.map(s => ({no: s.no, name: s.name}));
  },
  
  // 获取请假记录
  getLeaveRecords: function(date) {
    const targetDate = date || S.currentDate;
    return S.leaveRecords.filter(r => r.startDate === targetDate);
  },
  
  // 获取考勤统计
  getStats: function() {
    const stats = {present: 0, late: 0, absent: 0, leave: 0};
    const ps = S.rosterState[S.currentPeriod] || {};
    Object.values(ps).forEach(st => {
      if (stats.hasOwnProperty(st)) stats[st]++;
    });
    return {
      total: students.length,
      ...stats,
      unmarked: students.length - stats.present - stats.late - stats.absent - stats.leave
    };
  },
  
  // 导出JSON数据供AI分析
  exportJSON: function() {
    return JSON.stringify({
      exportTime: new Date().toISOString(),
      classInfo: Classes.getConfig().name,
      school: Classes.getConfig().school,
      date: S.currentDate,
      students: students,
      attendance: S.attendanceRecords,
      leaves: S.leaveRecords,
      callCounts: S.callCounts,
      stats: this.getStats()
    }, null, 2);
  },
  
  // 批量设置考勤状态
  batchSetStatus: function(studentNos, status) {
    if(!S.rosterState[S.currentPeriod])S.rosterState[S.currentPeriod]={};
    const ps=S.rosterState[S.currentPeriod];
    const key = S.currentDate + '_' + S.currentPeriod;
    if (!S.attendanceRecords[key]) S.attendanceRecords[key] = {};
    studentNos.forEach(no => {
      if (ps[no] !== 'leave') {
        ps[no] = status;
        S.attendanceRecords[key][no] = status;
      }
    });
    renderRoster();
    DataSync.triggerAutoSync();
    return '已批量设置 ' + studentNos.length + ' 名学生状态为 ' + status;
  },
  
  // 获取缺勤学生列表
  getAbsentStudents: function() {
    const ps=S.rosterState[S.currentPeriod]||{};
    return students.filter(s => ps[s.no] === 'absent').map(s => ({
      no: s.no,
      name: s.name,
      period: S.currentPeriod,
      date: S.currentDate
    }));
  },
  
  // 切换时段
  switchPeriod: function(periodId) {
    const period = ATTENDANCE_PERIODS.find(p => p.id === periodId);
    if (period) {
      S.currentPeriod = periodId;
      renderPeriodBar();
      renderRoster();
      return '已切换到时段: ' + period.name;
    }
    return '时段不存在: ' + periodId;
  },
  
  // 获取时段列表
  getPeriods: function() {
    return ATTENDANCE_PERIODS;
  },
  
  // 显示CLI帮助
  help: function() {
    return {
      methods: [
        'getTodayAttendance() - 获取今日考勤概况',
        'getStudents() - 获取学生列表',
        'getLeaveRecords(date) - 获取请假记录',
        'getStats() - 获取考勤统计',
        'exportJSON() - 导出JSON数据',
        'batchSetStatus(nos, status) - 批量设置状态',
        'getAbsentStudents() - 获取缺勤学生',
        'switchPeriod(id) - 切换时段',
        'getPeriods() - 获取时段列表',
        'faceRecognition.status() - 人脸识别状态',
        'help() - 显示帮助'
      ]
    };
  }
};

<script>
document.addEventListener('DOMContentLoaded', () => {
  // 恢复自动同步状态
  if (DataSync.autoSync) {
    DataSync.startAutoSync();
  }

  const splash = document.getElementById('splashScreen');
  if (!splash) return;
  const loadStart = Date.now();
  const minShowTime = 1500; // minimum 1.5 seconds

  function dismissSplash() {
    const elapsed = Date.now() - loadStart;
    const remaining = Math.max(0, minShowTime - elapsed);
    setTimeout(() => {
      splash.classList.add('fade-out');
      setTimeout(() => splash.remove(), 600);
    }, remaining);
  }

  // Wait for all images/resources or timeout after 5s
  if (document.readyState === 'complete') {
    dismissSplash();
  } else {
    window.addEventListener('load', dismissSplash);
    // Fallback timeout
    setTimeout(dismissSplash, 5000);
  }

  // Click to skip
  splash.addEventListener('click', () => {
    splash.classList.add('fade-out');
    setTimeout(() => splash.remove(), 600);
  });
});
</script>
