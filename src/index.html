<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>星辰班务</title>
<style>
/* ===== Reset & Variables ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c1220;--surface:#131b2e;--card:#1a2340;--elevated:#1f2b4a;
  --gold:#f0a830;--gold-dim:rgba(240,168,48,.12);--gold-glow:rgba(240,168,48,.35);
  --blue:#5b8def;--blue-dim:rgba(91,141,239,.12);
  --coral:#ff453a;--green:#34c759;--purple:#a78bfa;--cyan:#22d3ee;
  --text:#e8ecf1;--text2:#8895a7;--text3:#7a8599;
  --border:rgba(255,255,255,.06);--shadow:0 4px 24px rgba(0,0,0,.3);
  --z-overlay:10;--z-panel:20;--z-modal:30;--z-notification:40;--z-toast:50;

  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
  --r:14px;--r-lg:20px;--ease:cubic-bezier(.4,0,.2,1);--ease-bounce:cubic-bezier(.34,1.56,.64,1);
}
html.light{
  --bg:#f5f0e8;--surface:#ede6d8;--card:#ffffff;--elevated:#ffffff;
  --text:#1a1a2e;--text2:#6b7280;--text3:#6b7280;
  --border:rgba(0,0,0,.08);--shadow:0 4px 24px rgba(0,0,0,.06);
  --gold-dim:rgba(240,168,48,.08);--blue-dim:rgba(91,141,239,.08);
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);transition:background .3s,color .3s}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.35),transparent),radial-gradient(1px 1px at 25% 55%,rgba(255,255,255,.25),transparent),radial-gradient(1.5px 1.5px at 42% 8%,rgba(255,255,255,.4),transparent),radial-gradient(1px 1px at 58% 72%,rgba(255,255,255,.2),transparent),radial-gradient(1px 1px at 73% 35%,rgba(255,255,255,.3),transparent),radial-gradient(1.5px 1.5px at 88% 60%,rgba(255,255,255,.35),transparent),radial-gradient(1px 1px at 15% 82%,rgba(255,255,255,.2),transparent),radial-gradient(1px 1px at 62% 45%,rgba(255,255,255,.25),transparent),radial-gradient(1px 1px at 35% 90%,rgba(255,255,255,.15),transparent),radial-gradient(1px 1px at 80% 12%,rgba(255,255,255,.3),transparent),radial-gradient(1px 1px at 48% 28%,rgba(255,255,255,.2),transparent),radial-gradient(1px 1px at 92% 85%,rgba(255,255,255,.25),transparent)}
html.light body::before{opacity:0}
html.light body::after{opacity:0}
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(91,141,239,.06),transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(240,168,48,.04),transparent 40%),radial-gradient(ellipse at 50% 90%,rgba(167,139,250,.04),transparent 40%)}

/* ===== Layout ===== */
#app{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr;height:100vh;height:100dvh;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0}
.brand h1{font-size:clamp(24px,3.5vw,36px);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}
.brand h1 span{color:var(--gold)}
.brand small{color:var(--text2);font-size:12px;font-weight:600;letter-spacing:.08em}
.headerRight{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.modeTabs{display:flex;gap:6px}
.tab{height:36px;padding:0 14px;border:1px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:.2s var(--ease);font-family:var(--font)}
.tab:hover{color:var(--text);border-color:rgba(255,255,255,.12)}
.tab.active{background:var(--gold);color:#0c1220;border-color:var(--gold);box-shadow:0 2px 12px var(--gold-glow)}
html.light .tab:hover{border-color:rgba(0,0,0,.15)}
.iconBtn{width:36px;height:36px;border:1px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-size:16px;cursor:pointer;transition:.2s;display:grid;place-items:center}
.iconBtn:hover{color:var(--text);border-color:rgba(255,255,255,.12)}

/* ===== Main Content ===== */
.content{display:grid;grid-template-columns:minmax(0,1fr) clamp(260px,26vw,320px);gap:12px;padding:16px;overflow:hidden;min-height:0}
.mainPanel{display:flex;flex-direction:column;gap:10px;min-height:0;min-width:0;overflow:hidden}
.drawArea{flex:1;position:relative;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--border);overflow:hidden;min-height:0}
.modeView{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.modeView.active{display:flex}
.controls{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px;flex-shrink:0}
.btn{height:48px;border:0;border-radius:var(--r);font-size:18px;font-weight:800;cursor:pointer;transition:.15s var(--ease);font-family:var(--font);letter-spacing:.02em}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--gold);color:#0c1220;box-shadow:0 4px 16px var(--gold-glow)}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 6px 24px var(--gold-glow)}
.btn-secondary{background:var(--elevated);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{color:var(--text);border-color:rgba(255,255,255,.12)}
.btn-danger{background:linear-gradient(135deg,var(--coral),#e84a6a);color:#fff}
.btn-danger:hover{filter:brightness(1.1)}

/* ===== Sidebar ===== */
.sidebar{display:flex;flex-direction:column;gap:10px;min-height:0;overflow:hidden}
.sideCard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat{text-align:center;padding:8px 4px;border-radius:12px;background:var(--surface)}
.stat .num{font-size:22px;font-weight:900;color:var(--gold)}
.stat .lbl{font-size:16px;color:var(--text2);margin-top:2px}
.sideToolbar{display:flex;gap:6px;flex-wrap:wrap}
.sideBtn{padding:5px 10px;border:1px solid var(--border);border-radius:999px;background:transparent;color:var(--text2);font-size:16px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--font)}
.sideBtn:hover{color:var(--text);border-color:var(--gold);background:var(--gold-dim)}
.sideBtn.active{background:var(--gold);color:#0c1220;border-color:var(--gold)}
.sideTips{font-size:16px;color:var(--text3);line-height:1.5}
.histTitle{display:flex;justify-content:space-between;align-items:center}
.histTitle h3{font-size:16px;font-weight:800}
.histList{display:flex;flex-direction:column;gap:4px;overflow-y:auto;flex:1;min-height:0}
.histItem{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:12px;background:var(--surface);font-size:12px;flex-shrink:0}
.histItem b{color:var(--text)}
.histItem .meta{color:var(--text3);font-size:16px;display:flex;align-items:center;gap:5px}
.statusDot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.statusDot.present{background:var(--green)}.statusDot.late{background:var(--gold)}.statusDot.absent{background:var(--coral)}.statusDot.leave{background:var(--blue)}

/* ===== Mode: Gacha ===== */
.gachaWrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.gachaBtn{width:clamp(130px,22vw,190px);height:clamp(130px,22vw,190px);border-radius:50%;border:3px solid var(--gold);background:radial-gradient(circle at 40% 35%,rgba(240,168,48,.18),transparent 70%),radial-gradient(circle,var(--gold-dim),transparent);color:var(--gold);font-size:clamp(22px,3.5vw,36px);font-weight:900;cursor:pointer;transition:.3s var(--ease);font-family:var(--font);position:relative;z-index:2;box-shadow:0 0 50px var(--gold-glow),0 0 100px rgba(240,168,48,.1),inset 0 0 30px rgba(240,168,48,.1);letter-spacing:.08em}
.gachaBtn::before{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(240,168,48,.3);animation:gachaPulse 2s ease-in-out infinite}
.gachaBtn::after{content:"";position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(240,168,48,.15);animation:gachaPulse 2s ease-in-out infinite .5s}
@keyframes gachaPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:1}}
.gachaBtn:hover{transform:scale(1.06);box-shadow:0 0 70px var(--gold-glow),0 0 140px rgba(240,168,48,.15),inset 0 0 40px rgba(240,168,48,.15)}
.gachaBtn:active{transform:scale(.95)}
.gachaBtn.disabled{opacity:.4;pointer-events:none}
.gachaHint{color:var(--text3);font-size:13px;margin-top:16px}
.gachaCardWrap{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:10}
.gachaCardWrap.active{display:flex}
.gachaCard{width:clamp(200px,28vw,280px);height:clamp(280px,40vw,400px);perspective:1200px;cursor:pointer}
.gachaCardInner{position:relative;width:100%;height:100%;transition:transform .8s var(--ease);transform-style:preserve-3d}
.gachaCard.flipped .gachaCardInner{transform:rotateY(180deg)}
.gachaCardFace{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-lg);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gachaBack{background:linear-gradient(135deg,#1a1040,#0c1a3a);border:2px solid var(--gold);box-shadow:0 0 50px var(--gold-glow),inset 0 0 40px rgba(240,168,48,.06)}
.gachaBackDesign{position:absolute;inset:12px;border:1px solid rgba(240,168,48,.25);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:radial-gradient(circle at 50% 40%,rgba(240,168,48,.06),transparent 70%)}
.gachaBackDesign::before{content:"✦";font-size:52px;color:var(--gold);opacity:.7;text-shadow:0 0 20px rgba(240,168,48,.4)}
.gachaBackDesign::after{content:"";position:absolute;inset:8px;border:1px dashed rgba(240,168,48,.12);border-radius:12px;pointer-events:none}
.gachaBackDesign span{color:var(--gold);font-size:18px;font-weight:800;letter-spacing:.15em;opacity:.6;text-transform:uppercase}
.gachaFront{transform:rotateY(180deg);background:linear-gradient(160deg,#faf8f5,#f0ece4);border:2px solid var(--gold);box-shadow:0 0 40px var(--gold-glow)}
.gachaRarity{position:absolute;top:12px;right:12px;padding:3px 10px;border-radius:999px;font-size:16px;font-weight:900;letter-spacing:.05em}
.gachaRarity.ssr{background:linear-gradient(135deg,#f0a830,#f97316);color:#fff}
.gachaRarity.sr{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.gachaRarity.r{background:linear-gradient(135deg,#5b8def,#3b6fd4);color:#fff}
.gachaRarity.n{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.gachaName{font-size:clamp(32px,6vw,64px);font-weight:900;color:#1a1a2e;margin-top:12px;max-width:90%;word-break:keep-all;line-height:1.1}
.gachaNo{font-size:16px;color:#888;margin-top:6px}
.gachaStars{position:absolute;bottom:16px;display:flex;gap:4px}
.gachaStar{color:var(--gold);font-size:18px}
.gachaBurst{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:11;pointer-events:none}
.gachaBurst.active{display:flex}
.gachaBurstRing{width:300px;height:300px;border-radius:50%;border:2px solid var(--gold);opacity:0;animation:burstRing .8s ease-out forwards}
.gachaBurstRing2{position:absolute;width:300px;height:300px;border-radius:50%;border:1px solid rgba(240,168,48,.4);opacity:0;animation:burstRing .8s ease-out .15s forwards}
@keyframes burstRing{0%{transform:scale(.2);opacity:.8}100%{transform:scale(3.5);opacity:0}}

/* ===== Mode: Slot ===== */
.slotFrame{width:min(90%,600px);background:linear-gradient(180deg,#1a1040,#0c1a3a);border:3px solid var(--gold);border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 0 40px var(--gold-glow),inset 0 0 20px rgba(240,168,48,.05)}
.slotReels{display:flex;gap:8px;width:100%}
.slotReel{flex:1;height:clamp(80px,14vh,120px);overflow:hidden;border-radius:12px;background:var(--bg);border:2px solid rgba(240,168,48,.2);position:relative}
.slotReel::before,.slotReel::after{content:"";position:absolute;left:0;right:0;height:25%;z-index:2;pointer-events:none}
.slotReel::before{top:0;background:linear-gradient(var(--bg),transparent)}
.slotReel::after{bottom:0;background:linear-gradient(transparent,var(--bg))}
.slotReelInner{position:absolute;left:0;right:0;top:0;transition:transform .4s var(--ease)}
.slotReelItem{height:clamp(80px,14vh,120px);display:flex;align-items:center;justify-content:center;font-size:clamp(20px,3.5vw,32px);font-weight:900;color:var(--text)}
.slotHighlight{position:absolute;top:50%;left:0;right:0;height:clamp(80px,14vh,120px);transform:translateY(-50%);border-top:2px solid var(--gold);border-bottom:2px solid var(--gold);z-index:3;pointer-events:none;box-shadow:0 0 20px var(--gold-glow)}

/* ===== Winner Overlay ===== */
.winnerOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:8;backdrop-filter:blur(6px)}
.winnerOverlay.show{display:flex}
.winnerCard{background:var(--card);border:2px solid var(--gold);border-radius:var(--r-lg);padding:clamp(24px,4vw,48px);text-align:center;box-shadow:0 0 60px var(--gold-glow);animation:winnerPop .5s var(--ease-bounce)}
@keyframes winnerPop{0%{transform:scale(.6) translateY(30px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.winnerLabel{font-size:16px;font-weight:800;color:var(--gold);letter-spacing:.1em;margin-bottom:8px}
.winnerName{font-size:clamp(48px,10vw,96px);font-weight:900;line-height:1}
.winnerNo{font-size:16px;color:var(--text2);margin-top:8px}
.winnerHint{font-size:12px;color:var(--text3);margin-top:16px}

/* ===== Attendance Panel (bottom-right corner) ===== */
.attendPanel{position:fixed;bottom:20px;right:20px;z-index:50;display:none;flex-direction:column;gap:8px;background:var(--card);border:2px solid var(--gold);border-radius:var(--r);padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 20px var(--gold-glow);animation:panelIn .3s var(--ease-bounce);min-width:220px}
.attendPanel.show{display:flex}
@keyframes panelIn{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.attendPanelName{font-size:22px;font-weight:900;text-align:center;color:var(--gold);padding:4px 0}
.attendPanelLabel{font-size:16px;color:var(--text3);text-align:center;margin-bottom:2px}
.attendBtns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.attendBtn{height:36px;border:0;border-radius:8px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;font-family:var(--font)}
.attendBtn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.attendBtn.present{background:var(--green)}.attendBtn.late{background:var(--gold);color:#0c1220}.attendBtn.absent{background:var(--coral)}.attendBtn.leave{background:var(--blue)}
.modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(6px)}
.modal.show{display:flex}
.modalBox{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:clamp(20px,3vw,32px);min-width:clamp(280px,40vw,400px);text-align:center;box-shadow:var(--shadow);animation:modalIn .25s var(--ease-bounce)}
@keyframes modalIn{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.modalBox h3{font-size:16px;font-weight:800;margin-bottom:6px}
.modalName{font-size:clamp(32px,6vw,48px);font-weight:900;margin-bottom:20px}
.closeBtn{width:100%;height:40px;margin-top:10px;border:0;border-radius:12px;background:var(--surface);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);z-index:60;padding:14px 20px;border-radius:999px;background:var(--elevated);color:var(--text);font-size:13px;font-weight:700;opacity:0;transition:.25s var(--ease);pointer-events:none;border:1px solid var(--border)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Particles ===== */
.particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:100;animation:particleBurst .8s ease-out forwards}
@keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
.confetti{position:fixed;width:8px;height:12px;border-radius:2px;pointer-events:none;z-index:100;animation:confettiFall 1.5s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== Responsive ===== */
@media(max-width:860px){
  .content{grid-template-columns:1fr}
  .sidebar{display:none}
  .sidebar.mobileShow{display:flex;position:fixed;inset:0;z-index:40;background:var(--bg);padding:16px;overflow-y:auto}
  .brand small{display:none}
  .modeTabs{gap:4px}
  .tab{height:32px;padding:0 10px;font-size:12px}
  .attendPanel{bottom:12px;right:12px;left:12px;min-width:auto}
}
@media(max-height:600px){
  header{padding:8px 16px}
  .controls .btn{height:40px;font-size:13px}
}
#modeTitle{font-size:18px;font-weight:700;color:var(--text);padding:8px 16px;text-align:center}
#rosterView{align-items:stretch;justify-content:flex-start;padding:0}
.rosterLayout{display:flex;gap:12px;width:100%;height:100%;overflow:hidden;padding:16px;min-height:0}
.rosterList{flex:1;min-width:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;overflow-y:auto;align-content:start;padding:8px}
.rosterItem{display:flex;align-items:center;gap:4px;padding:6px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all .1s}
.rosterItem:hover{border-color:var(--gold);background:var(--gold-dim)}
.rosterItem .rno{color:var(--text3);font-size:16px;min-width:20px}
.rosterItem .rname{flex:1}
.rosterItem .rbadge{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:12px;background:var(--elevated);border:1px solid var(--border);flex-shrink:0}
.rosterItem .rbadge.present{background:#34d399;color:#fff;border-color:#34d399}
.rosterItem .rbadge.late{background:#f0a830;color:#0c1220;border-color:#f0a830}
.rosterItem .rbadge.absent{background:#ff6b88;color:#fff;border-color:#ff6b88}
.rosterItem .rbadge.leave{background:#5b8def;color:#fff;border-color:#5b8def}
.rosterSide{display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-width:240px;flex-shrink:0}
.rosterStatGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.rosterStat{text-align:center;padding:14px 6px;border-radius:12px;background:var(--surface)}
.rosterStat .num{font-size:24px;font-weight:900}
.rosterStat .lbl{font-size:16px;color:var(--text2)}
.rosterBtns{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:auto}
.rosterBtns .btn{height:36px;font-size:12px}
@media(max-width:500px){.rosterLayout{grid-template-columns:1fr}.rosterSide{display:none}
.rosterMobileBar{display:none;gap:6px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
@media(max-width:500px){.rosterMobileBar{display:flex;justify-content:center}}}
@media(max-width:860px){#leavePanel>div{flex-wrap:wrap}#leavePanel>div>div:last-child{width:100%;max-height:200px}}

#periodBar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px}
.periodChip{padding:4px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.periodChip:hover{border-color:var(--gold)}
.periodChip.active{background:var(--gold);color:#0c1220;border-color:var(--gold)}

/* History Query */
.historyLayout{display:grid;grid-template-columns:200px 1fr;gap:12px;width:100%;height:100%;overflow:hidden;padding:16px}
@media(max-width:860px){.historyLayout{grid-template-columns:1fr}.historyDates{max-height:120px;flex-direction:row;flex-wrap:nowrap;overflow-x:auto;gap:4px}.historyDateItem{white-space:nowrap;flex-shrink:0}}
.historyDates{display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.historyDateItem{padding:8px 12px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:700;transition:.15s}
.historyDateItem:hover{border-color:var(--gold)}
.historyDateItem.active{background:var(--gold);color:#0c1220;border-color:var(--gold)}
.historyContent{overflow-y:auto}

/* Class Manager Panel */

.cm-actions .cancel{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.cm-hint{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.5}

:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
.tab:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

/* Tab Group with Submenu */
.tabGroup{position:relative;display:inline-flex}
.tabSubmenu{display:none;position:absolute;top:100%;left:0;z-index:20;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:4px;box-shadow:var(--shadow);min-width:120px}
.tabGroup:hover .tabSubmenu,.tabGroup.open .tabSubmenu{display:flex;flex-direction:column;gap:2px}
.tabSub{padding:6px 12px;border-radius:8px;background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:.15s;text-align:left;white-space:nowrap}

#splashScreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease,transform .6s ease}
#splashScreen.fade-out{opacity:0;transform:scale(1.05)}
.splash-logo{font-size:96px;margin-bottom:24px;animation:splashPulse 2s ease-in-out infinite;position:relative}
.splash-logo::before{content:"";position:absolute;inset:-18px;border-radius:50%;border:2px solid transparent;background:conic-gradient(from 0deg,transparent,rgba(240,168,48,.6),transparent,rgba(91,141,239,.4),transparent) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:splashRing 3s linear infinite}
.splash-school{font-size:56px;font-weight:900;color:#fff;letter-spacing:6px;margin-bottom:8px;animation:splashSlideUp .8s ease-out;text-shadow:0 0 40px rgba(240,168,48,0.3)}

.splash-dot{width:16px;height:16px;border-radius:50%;background:#f0a830;animation:splashBounce 1.4s ease-in-out infinite}

@keyframes splashSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

#callBanner{position:fixed;top:50%;left:0;right:0;z-index:9998;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-top:3px solid var(--gold);border-bottom:3px solid var(--gold);padding:20px 0;overflow:hidden;cursor:pointer;transform:translateY(-50%)}
#callBanner .call-text{white-space:nowrap;font-size:clamp(28px,5vw,48px);font-weight:900;color:var(--gold);animation:marqueeScroll 8s linear infinite;display:inline-block;padding-left:100%}

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script>
/* ===== 班级管理 ===== */
const Classes = {
  storageKey: 'starclass_classes',

  getAll: function() {
    try {
      const saved = localStorage.getItem(this.storageKey);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return [{ id: 'class_1', name: '高二8班', school: '赣三中' }];
  },

  save: function(classes) {
    localStorage.setItem(this.storageKey, JSON.stringify(classes));
  },

  getCurrent: function() {
    const classes = this.getAll();
    const currentId = localStorage.getItem('starclass_current_class') || classes[0]?.id;
    return classes.find(c => c.id === currentId) || classes[0];
  },

  switchTo: function(classId) {
    localStorage.setItem('starclass_current_class', classId);
    autoLoad();
    render();
    toast('已切换到: ' + this.getCurrent().name);
  },

  add: function(name, school) {
    const classes = this.getAll();
    const id = 'class_' + Date.now();
    classes.push({ id, name, school: school || '' });
    this.save(classes);
    return id;
  },

  remove: function(classId) {
    const classes = this.getAll().filter(c => c.id !== classId);
    this.save(classes);
    if (this.getCurrent().id === classId && classes.length > 0) {
      this.switchTo(classes[0].id);
    }
  },

  // 获取当前班级完整信息（含学校名）
  getConfig: function() {
    var c = this.getCurrent();
    return { id: c.id, name: c.name || '未命名班级', school: c.school || '' };
  },

  getSchool: function() {
    return this.getCurrent().school || '';
  },

  setSchool: function(name) {
    var classes = this.getAll();
    var currentId = this.getCurrent().id;
    for (var i = 0; i < classes.length; i++) {
      if (classes[i].id === currentId) {
        classes[i].school = name;
        break;
      }
    }
    this.save(classes);
  },

  rename: function(classId, newName) {
    var classes = this.getAll();
    for (var i = 0; i < classes.length; i++) {
      if (classes[i].id === classId) {
        classes[i].name = newName;
        break;
      }
    }
    this.save(classes);
  },

  refreshSelector: function() {
    var sel = document.getElementById('classSelector');
    if (!sel) return;
    var classes = this.getAll();
    var current = this.getCurrent();
    while (sel.firstChild) sel.removeChild(sel.firstChild);
    classes.forEach(function(cls) {
      var opt = document.createElement('option');
      opt.value = cls.id;
      opt.textContent = cls.name;
      if (cls.id === current.id) opt.selected = true;
      sel.appendChild(opt);
    });
  }
};

/* ===== 班级管理面板 ===== */
function openClassManager(){
  var m=document.getElementById('classManagerModal');
  if(!m)return;
  renderClassManager();
  m.classList.add('show');
  m.onclick=function(e){if(e.target===m)m.classList.remove('show')};
}

function renderClassManager(){
  var c=document.getElementById('classManagerContent');
  if(!c)return;
  var school=Classes.getSchool();
  var classes=Classes.getAll();
  var current=Classes.getCurrent();

  var html='<h3>⚙️ 班级管理</h3><div class="sub">设置学校名称，添加/管理班级</div>';

  // School name
  html+='<div class="cm-field"><label>学校名称</label>';
  html+='<input id="cmSchool" value="'+school+'" placeholder="例：赣三中"></div>';

  // Class list
  html+='<div class="cm-field"><label>班级列表</label>';
  html+='<div class="cm-classList" id="cmClassList">';
  classes.forEach(function(cls){
    var isDef=cls.id===current.id;
    html+='<div class="cm-classItem'+(isDef?' is-default':'')+'" data-id="'+cls.id+'">';
    html+='<span class="defaultDot'+(isDef?'':' empty')+'"></span>';
    html+='<span class="name">'+cls.name+'</span>';
    html+='<button onclick="cmSetDefault(\''+cls.id+'\')">设为默认</button>';
    html+='<button onclick="cmRenameClass(\''+cls.id+'\')">重命名</button>';
    html+='<button class="danger" onclick="cmRemoveClass(\''+cls.id+'\')">删除</button>';
    html+='</div>';
  });
  html+='</div></div>';

  // Add class
  html+='<div class="cm-field"><label>添加新班级</label>';
  html+='<button onclick="cmAddClass()">+ 添加班级</button></div>';

  html+='<div class="cm-hint">💡 学校名称全局生效，班级可自由增删。设为默认的班级为启动时的默认选择。</div>';

  // Actions
  html+='<div class="cm-actions">';
  html+='<button class="cancel" onclick="closeClassManager()">取消</button>';
  html+='<button class="save" onclick="cmSave()">保存</button>';
  html+='</div>';

  c.innerHTML=html;
}

function closeClassManager(){
  var m=document.getElementById('classManagerModal');
  if(m)m.classList.remove('show');
}

function cmAddClass(){
  var name=prompt('输入新班级名称：');
  if(!name)return;
  name=name.trim();
  if(!name){toast('班级名称不能为空');return}
  Classes.add(name);
  renderClassManager();
  toast('已添加: '+name);
}

function cmRemoveClass(id){
  var classes=Classes.getAll();
  if(classes.length<=1){toast('至少保留一个班级');return}
  var cls=classes.find(function(c){return c.id===id});
  if(!cls)return;
  var ok=confirm('确定删除「'+cls.name+'」？');
  if(!ok){
    var input=prompt('输入"'+cls.name+'"确认删除：');
    if(input!==cls.name)return;
  }
  Classes.remove(id);
  renderClassManager();
  toast('已删除「'+cls.name+'」');
}

function cmSetDefault(id){
  localStorage.setItem('starclass_current_class',id);
  renderClassManager();
  toast('已设为默认: '+Classes.getCurrent().name);
}

function cmRenameClass(id){
  var classes=Classes.getAll();
  var cls=classes.find(function(c){return c.id===id});
  if(!cls)return;
  var newName=prompt('输入新班级名称：',cls.name);
  if(!newName)return;
  newName=newName.trim();
  if(!newName||newName===cls.name)return;
  Classes.rename(id,newName);
  renderClassManager();
  toast('已重命名为: '+newName);
}

function cmSave(){
  var school=document.getElementById('cmSchool');
  if(school)Classes.setSchool(school.value.trim());
  Classes.refreshSelector();
  applyClassConfig();
  closeClassManager();
  toast('✅ 班级配置已保存');
}

/* ===== Auto-save to localStorage ===== */
function autoSave(){
  const classId = Classes.getCurrent()?.id || 'default';
  try{localStorage.setItem('starclass_data_'+classId,JSON.stringify({rosterState:S.rosterState,attendanceRecords:S.attendanceRecords,leaveRecords:S.leaveRecords,callCounts:S.callCounts,students:students}))}catch(e){}
}
function autoLoad(){
  const classId = Classes.getCurrent()?.id || 'default';
  try{
    const d=JSON.parse(localStorage.getItem('starclass_data_'+classId));
    if(d){
      if(d.rosterState){
        // 旧格式(平铺)迁移为按时段结构
        const rs=d.rosterState;
        const isPerPeriod=Object.values(rs).every(v=>typeof v==='object'&&!Array.isArray(v));
        if(isPerPeriod){S.rosterState=rs}
        else{S.rosterState={'morning':rs,'am1':{},'pm1':{},'evening':{},'night1':{}}}
      }
      if(d.attendanceRecords)S.attendanceRecords=d.attendanceRecords;
      if(d.leaveRecords)S.leaveRecords=d.leaveRecords;
      if(d.callCounts)Object.assign(S.callCounts,d.callCounts);
      if(d.students&&d.students.length>0){
        students.length=0;
        d.students.forEach(s=>students.push(s));
        S.remaining=[...students];
      }
    }
  }catch(e){}
}
// 初始化调用已移至主脚本块末尾（S对象定义之后）


/* ===== Auto-Absent Timer ===== */
let autoAbsentTimer = null;
let autoAbsentMinutes = 15; // 默认15分钟后自动标记缺勤

function startAutoAbsentTimer(){
  stopAutoAbsentTimer();
  autoAbsentTimer = setTimeout(()=>{
    // Find unmarked students
    const key = S.currentDate + '_' + S.currentPeriod;
    if(!S.attendanceRecords[key]) S.attendanceRecords[key] = {};
    const periodState = S.rosterState[S.currentPeriod] || {};
    const unmarked = students.filter(s => !periodState[s.no]);
    if(unmarked.length === 0) return;
    
    // Auto-mark as absent
    unmarked.forEach(s => {
      periodState[s.no] = 'absent';
      S.attendanceRecords[key][s.no] = 'absent';
    });
    
    // Show notification
    const names = unmarked.map(s => s.name).join('\u3001');
    const msg = unmarked.length + '\u540d\u5b66\u751f\u672a\u6807\u8bb0\u5df2\u81ea\u52a8\u6807\u8bb0\u4e3a\u7f3a\u52e4\uff1a' + names;
    toast('\u26a0\ufe0f ' + msg);
    
    // Refresh display
    renderRoster();
  }, autoAbsentMinutes * 60 * 1000);
  
  toast('\u23f0 \u81ea\u52a8\u7f3a\u52e4\u8ba1\u65f6\u5df2\u542f\u52a8\uff08' + autoAbsentMinutes + '\u5206\u949f\u540e\u81ea\u52a8\u6807\u8bb0\uff09');
}

function stopAutoAbsentTimer(){
  if(autoAbsentTimer){
    clearTimeout(autoAbsentTimer);
    autoAbsentTimer = null;
  }
}

// Start timer when entering roster mode
const originalSetMode = typeof setMode === 'function' ? setMode : null;


function showBatchResults() {
  const results = window._batchResults || [];
  const resultDiv = document.getElementById('leaveParseResult');
  const contentDiv = document.getElementById('leaveParseContent');
  if (!resultDiv || !contentDiv) return;
  
  let html = '<div style="font-size:13px;margin-bottom:8px;color:var(--gold)">\ud83d\udccc \u68c0\u6d4b\u5230 '+results.length+' \u6761\u8bf7\u5047\u6d88\u606f</div>';
  
  results.forEach((result, i) => {
    const stars = '\u2605'.repeat(result.confidence) + '\u2606'.repeat(5 - result.confidence);
    const names = result.students.map(s=>s.name).join('\u3001') || '\u672a\u8bc6\u522b';
    const status = result.students.length > 0 ? '\u2705' : '\u274c';
    
    html += '<div style="padding:8px;margin-bottom:6px;background:var(--surface);border-radius:8px;border:1px solid var(--border);font-size:12px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center">';
    html += '<b>'+status+' '+names+'</b>';
    html += '<span style="color:var(--text2)">'+result.type+' | '+result.startDate+' | '+result.periods.join('\u3001')+'</span>';
    html += '</div>';
    html += '<div style="color:var(--text3);font-size:11px;margin-top:2px">\u7f6e\u4fe1\u5ea6: '+stars+'</div>';
    html += '</div>';
  });
  
  contentDiv.innerHTML = html;
  resultDiv.style.display = 'block';
  
  // Show batch confirm button
  const existingBtn = document.getElementById('batchConfirmBtn');
  if (existingBtn) existingBtn.remove();
  const btn = document.createElement('button');
  btn.id = 'batchConfirmBtn';
  btn.className = 'btn btn-primary';
  btn.style.cssText = 'width:100%;height:40px;font-size:13px;margin-top:8px';
  btn.textContent = '\u2705 \u786e\u8ba4\u63d0\u4ea4\u5168\u90e8 ('+results.filter(r=>r.students.length>0).length+'\u6761)';
  btn.onclick = confirmBatchLeave;
  resultDiv.appendChild(btn);
}

function confirmBatchLeave() {
  const results = window._batchResults || [];
  let count = 0;
  
  results.forEach(result => {
    if (result.students.length === 0) return;
    result.students.forEach(student => {
      S.leaveRecords.push({
        id: Date.now() + '_' + student.no + '_' + count,
        studentNo: student.no,
        studentName: student.name,
        type: result.type,
        startDate: result.startDate,
        endDate: result.endDate,
        periods: result.periods,
        reason: result.reason,
        source: 'paste',
        rawText: result.rawText,
        submittedAt: new Date().toISOString(),
        status: 'approved'
      });
      // 自动同步考勤状态为请假
      if(!S.rosterState[S.currentPeriod])S.rosterState[S.currentPeriod]={};
      S.rosterState[S.currentPeriod][student.no] = 'leave';
      const key = S.currentDate + '_' + S.currentPeriod;
      if (!S.attendanceRecords[key]) S.attendanceRecords[key] = {};
      S.attendanceRecords[key][student.no] = 'leave';
      count++;
    });
  });
  
  toast('\u2705 \u5df2\u63d0\u4ea4 ' + count + ' \u6761\u8bf7\u5047\u8bb0\u5f55\uff0c\u8003\u52e4\u5df2\u540c\u6b65');
  renderLeaveRecords();
  renderRoster();
  document.getElementById('leaveTextInput').value = '';
  document.getElementById('leaveParseResult').style.display = 'none';
  window._batchResults = null;
}


const LEAVE_TEMPLATE = '\u3010\u8bf7\u5047\u7533\u8bf7\u3011\n\u5b66\u751f\u59d3\u540d\uff1a___\n\u5047\u522b\uff1a\u4e8b\u5047 / \u75c5\u5047 / \u516c\u5047\n\u8bf7\u5047\u65e5\u671f\uff1a___\u5e74___\u6708___\u65e5\n\u8bf7\u5047\u65f6\u6bb5\uff1a\u65e9\u8bfb / \u5348\u8bfb / \u665a\u8bfb / \u5168\u5929\n\u8bf7\u5047\u539f\u56e0\uff1a___\n\u5bb6\u957f\u7535\u8bdd\uff1a___\n\u5bb6\u957f\u7b7e\u540d\uff1a___';

function showLeaveTemplate() {
  const input = document.getElementById('leaveTextInput');
  if (input) {
    input.value = LEAVE_TEMPLATE;
    input.focus();
    input.select();
    toast('\ud83d\udccb \u8bf7\u5047\u6a21\u677f\u5df2\u586b\u5165\uff0c\u8bf7\u4fee\u6539\u7559\u767d\u5904');
  }
}

</script>

<body>
<div id="splashScreen">
  <div class="splash-logo">🌟</div>
  <div class="splash-school">星辰班务</div>
  <div class="splash-class">赣三中 · 高二8班</div>

    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>
<div id="app">
  <header>
    <div class="brand">
      <h1><span>✦</span> 星辰班务</h1>
      <small>高二 8 班</small>
      <select id="classSelector" onchange="Classes.switchTo(this.value)" style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;margin-left:12px">
      </select>
      <button class="iconBtn" onclick="openClassManager()" title="班级管理" style="width:28px;height:28px;font-size:14px">⚙️</button>
    </div>
    <div class="headerRight">
      <div class="modeTabs">

            <button class="tabSub" data-mode="slot">🎰 老虎机</button>
          </div>

        <button class="tab" data-mode="roster">📝 考勤</button>
        <button class="tab" data-mode="leave">💬 请假</button>

<script>
/* ===== Data ===== */
const students=[
{no:1,name:"曾浩"},{no:2,name:"曾金华"},{no:3,name:"曾丽芸"},{no:4,name:"陈陌"},{no:5,name:"陈清华"},
{no:6,name:"陈欣"},{no:7,name:"邓筱雅"},{no:8,name:"邓殷榕"},{no:9,name:"郭厚铭"},{no:10,name:"郭世勋"},
{no:11,name:"大郭妍"},{no:12,name:"小郭妍"},{no:13,name:"何赣英"},{no:14,name:"何雨晴"},{no:15,name:"黄佳"},
{no:16,name:"黄靖雯"},{no:17,name:"赖江豪"},{no:18,name:"李冉欣"},{no:19,name:"李思雨"},{no:20,name:"李宛翼"},
{no:21,name:"林昌湧"},{no:22,name:"刘彬"},{no:23,name:"刘航鸣"},{no:24,name:"刘淼"},{no:25,name:"刘瑞杨"},
{no:26,name:"刘树妍"},{no:27,name:"刘添奕"},{no:28,name:"刘芯钰"},{no:29,name:"刘奕含"},{no:30,name:"罗熙茗"},
{no:31,name:"罗晓宇"},{no:32,name:"欧阳子韬"},{no:33,name:"彭思成"},{no:34,name:"彭彤"},{no:35,name:"邱慧娟"},
{no:36,name:"宋祥先"},{no:37,name:"陶易冉"},{no:38,name:"王东旭"},{no:39,name:"王浩宇"},{no:40,name:"王周荣"},
{no:41,name:"肖学源"},{no:42,name:"肖媛月"},{no:43,name:"谢远航"},{no:44,name:"叶津如"},{no:45,name:"叶顺"},
{no:46,name:"游荣荣"},{no:47,name:"张德辉"},{no:48,name:"张文豪"},{no:49,name:"钟俊百琳"},{no:50,name:"钟俊杰"},
{no:51,name:"钟睿"},{no:52,name:"钟芯悦"},{no:53,name:"朱海燕"}
];

/* ===== State ===== */
const S={
  remaining:[...students],called:[],attendance:[],callCounts:{},
  drawing:false,mode:'gacha',pendingWinner:null,rosterState:{}
};
students.forEach(s=>S.callCounts[s.no]=0);

const $=id=>document.getElementById(id);

/* ===== Audio ===== */
let audioCtx=null;
function actx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function snd(type){
  try{
    const c=actx();
    if(type==='start'){
      [260,330,400,520].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.015;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.06);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+i*.06+.15);o.stop(c.currentTime+i*.06+.16)});
    }else if(type==='tick'){
      const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=380+Math.random()*180;g.gain.value=.008;o.connect(g);g.connect(c.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.035);o.stop(c.currentTime+.04);
    }else if(type==='finish'){
      [523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.02;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.08);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+i*.08+.25);o.stop(c.currentTime+i*.08+.26)});
    }else if(type==='gacha'){
      [440,554,659,880,1109].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.value=.018;o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*.07);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+i*.07+.3);o.stop(c.currentTime+i*.07+.31)});
    }
  }catch(e){}
}

/* ===== Toast ===== */
let toastTimer=null;
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),1200)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

/* ===== Particles ===== */
function burst(x,y,count=24){
  const colors=['#f0a830','#5b8def','#ff6b88','#34d399','#a78bfa','#22d3ee'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='particle';
    const a=(Math.PI*2*i)/count,d=60+Math.random()*100;
    p.style.cssText=`left:${x}px;top:${y}px;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.08}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),900);
  }
}
function confetti(){
  const colors=['#f0a830','#5b8def','#ff6b88','#34d399','#a78bfa','#fff'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='confetti';
    p.style.cssText=`left:${Math.random()*100}vw;top:${-10-Math.random()*20}px;background:${colors[i%colors.length]};animation-delay:${Math.random()*.1}s;width:${6+Math.random()*6}px;height:${8+Math.random()*8}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1600);
  }
}

/* ===== Helpers ===== */
function dateStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function timeStr(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}

/* ===== Render ===== */
function render(){
  $('sTotal').textContent=students.length;
  $('sCalled').textContent=S.called.length;
  $('sLeft').textContent=S.remaining.length;
  $('sPresent').textContent=S.attendance.filter(r=>r.status==='present'||r.status==='late').length;
  // History
  $('histList').innerHTML=S.called.slice().reverse().map((s,i)=>{
    const rec=S.attendance.find(r=>r.no===s.no);
    const dot=rec?`<span class="statusDot ${rec.status}"></span>`:'';
    const label=rec?{present:'出勤',late:'迟到',absent:'缺勤',leave:'请假'}[rec.status]:'';
    return `<div class="histItem"><b>${s.name}</b><div class="meta">${dot}${label} <span>#${String(s.no).padStart(2,'0')}</span></div></div>`;
  }).join('')||'<div style="color:var(--text3);text-align:center;padding:20px;font-size:13px">暂无记录</div>';
  // Build slot reels
  buildSlot();
}

/* ===== Mode Switch ===== */
function setMode(m){
  if(S.drawing)return;
  S.mode=m;
  // Tab active state
  document.querySelectorAll('.tabSub').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  const pickerTab=document.getElementById('pickerTab');
  if(pickerTab){
    const isPicker=['gacha','slot'].includes(m);
    pickerTab.classList.toggle('active',isPicker);
    if(isPicker){const names={gacha:'✦ 祈愿',slot:'🎰 老虎机'};pickerTab.textContent=names[m]||'✦ 点名'}
  }
  document.querySelectorAll('.tab[data-mode]').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  document.querySelectorAll('.modeView').forEach(v=>v.classList.toggle('active',v.id===m+'View'));
  $('winnerOverlay').classList.remove('show');
  $('attendPanel').classList.remove('show');

  // Mode title (Fix 3)
  const titleMap={gacha:'✨ 点名',slot:'✨ 点名',roster:'📝 考勤',leave:'💬 请假',history:'📊 历史'};
  const mt=$('modeTitle');
  if(mt)mt.textContent=titleMap[m]||'';

  // Controls visibility (Fix 8)
  const isPicker=['gacha','slot'].includes(m);
  const ctrl=$('drawControls');
  if(ctrl)ctrl.style.display=isPicker?'':'none';

  // PeriodBar visibility (Fix 4)
  const pb=$('periodBar');
  if(pb)pb.style.display=(m==='roster')?'':'none';

  // Import/Export visibility (Fix 5)
  const importBtnEl=document.querySelector('[onclick="importStudents()"]');
  const exportBtn=$('exportBtn');
  const statsBtn=$('statsBtn');
  if(importBtnEl){const p=importBtnEl.closest('.sideBtn');if(p)p.style.display=(m==='roster')?'':'none';}
  if(exportBtn)exportBtn.style.display=(m==='roster')?'':'none';
  if(statsBtn)statsBtn.style.display=(m==='roster')?'none':'';

  // Sidebar content switching (Fix 4+6)
  const pickerSide=$('pickerSide');
  const rosterSidebar=$('rosterSidebar');
  if(pickerSide)pickerSide.style.display=isPicker?'':'none';
  if(rosterSidebar)rosterSidebar.style.display=(m==='roster')?'':'none';
  // Hide entire sidebar in leave/history
  const sidebar=$('sidebar');
  if(sidebar)sidebar.style.display=(m==='leave'||m==='history')?'none':'';

  // Mode-specific actions
  if(m==='roster'){
    const now=new Date();const h=now.getHours();const m2=now.getMinutes();
    const timeVal=h*60+m2;
    let autoPeriod='morning';
    if(timeVal>=420&&timeVal<480)autoPeriod='morning';
    else if(timeVal>=480&&timeVal<850)autoPeriod='am1';
    else if(timeVal>=850&&timeVal<1080)autoPeriod='pm1';
    else if(timeVal>=1080&&timeVal<1140)autoPeriod='evening';
    else if(timeVal>=1140)autoPeriod='night1';
    S.currentPeriod=autoPeriod;
    renderRoster();renderPeriodBar();startAutoAbsentTimer();
  }else if(isPicker){
    renderPickerSide();
  }else if(m==='history'){
    renderHistory();
  }else if(m==='leave'){
    renderLeavePanel();
  }
}

/* ===== Gacha ===== */
let gachaAnimating=false;
async function drawGacha(chosen){
  gachaAnimating=true;
  const btn=$('gachaBtn'),wrap=$('gachaCardWrap'),card=$('gachaCard'),burst_el=$('gachaBurst');
  // CRITICAL: hide card first, THEN reset flip (user must NOT see reverse flip)
  wrap.classList.remove('active');
  card.style.transition='none';  // disable animation
  card.classList.remove('flipped');  // reset to back face instantly
  card.offsetHeight;  // force reflow
  card.style.transition='';  // re-enable animation
  // Hide button, show card
  btn.classList.add('disabled');
  wrap.classList.add('active');
  // Set card data
  // All students SSR for now (future: rank by attendance/homework/performance)
  let tier='ssr',stars=3;
  $('gachaRarity').textContent=tier.toUpperCase();
  $('gachaRarity').className='gachaRarity '+tier;
  $('gachaName').textContent=chosen.name;
  $('gachaNo').textContent='#'+String(chosen.no).padStart(2,'0');
  $('gachaStars').innerHTML=Array(stars).fill('<span class="gachaStar">★</span>').join('');
  // Burst effect
  await sleep(300);
  burst_el.classList.add('active');
  snd('gacha');
  burst(window.innerWidth/2,window.innerHeight/2,30);
  await sleep(500);
  burst_el.classList.remove('active');
  // Flip card
  card.classList.add('flipped');
  await sleep(1200);
  confetti();
  gachaAnimating=false;
}

/* ===== Slot ===== */

function buildSlot(){
  const pool=S.remaining.length?S.remaining:students;
  for(let r=0;r<3;r++){
    const reel=$('reel'+r);
    if(!reel)continue;
    // Build a long sequence
    const seq=[];
    for(let i=0;i<30;i++)seq.push(pool[Math.floor(Math.random()*pool.length)]);
    reel.innerHTML=seq.map(s=>`<div class="slotReelItem">${s.name}</div>`).join('');
    reel.style.transition='none';reel.style.transform='translateY(0)';
  }
}

async function drawSlot(chosen){
  const pool=S.remaining.length?S.remaining:students;
  const reelH=window.innerWidth<=860?80:Math.min(120,window.innerHeight*.14);
  for(let r=0;r<3;r++){
    const reel=$('reel'+r);
    const seq=[];
    for(let i=0;i<20+r*3;i++)seq.push(pool[Math.floor(Math.random()*pool.length)]);
    seq.push(chosen);
    reel.innerHTML=seq.map(s=>`<div class="slotReelItem">${s.name}</div>`).join('');
    reel.style.transition='none';reel.style.transform='translateY(0)';
  }
  await sleep(50);
  // Animate each reel with staggered stops
  for(let r=0;r<3;r++){
    const reel=$('reel'+r);
    const items=reel.querySelectorAll('.slotReelItem');
    const targetY=-(items.length-1)*reelH;
    reel.style.transition=`transform ${.8+r*.3}s cubic-bezier(.15,.85,.25,1)`;
    reel.style.transform=`translateY(${targetY}px)`;
  }
  // Wait for all reels to finish
  for(let i=0;i<8;i++){snd('tick');await sleep(120)}
}

/* ===== Draw Flow ===== */
async function startDraw(){
  if(S.drawing)return;
  if(!S.remaining.length){toast('已全部点完！');return}
  S.drawing=true;
  $('drawBtn').textContent='抽取中…';
  $('winnerOverlay').classList.remove('show');
  $('attendPanel').classList.remove('show');
  snd('start');
  let chosen;
  chosen=S.remaining[Math.floor(Math.random()*S.remaining.length)];
  if(S.mode==='gacha'){await drawGacha(chosen)}
  else if(S.mode==='slot'){await drawSlot(chosen)}
  finishDraw(chosen);
}

function finishDraw(chosen){
  const idx=S.remaining.findIndex(s=>s.no===chosen.no);
  const final=S.remaining.splice(idx,1)[0];
  S.called.push(final);
  S.callCounts[final.no]=(S.callCounts[final.no]||0)+1;
  // Show winner
  $('winnerName').textContent=final.name;
  $('winnerNo').textContent='#'+String(final.no).padStart(2,'0')+' · 第 '+S.called.length+' 位';
  $('winnerOverlay').classList.add('show');
  snd('finish');confetti();
  speak('\u8bf7 '+final.name+' \u540c\u5b66\u56de\u7b54\u95ee\u9898');
  S.drawing=false;
  $('drawBtn').textContent='✦ 继续抽取';
  render();
  // Show attendance after a brief delay
  setTimeout(()=>{
    S.pendingWinner=final;
    $('attendName').textContent=final.name;
    $('attendPanel').classList.add('show');
  },S.mode==='gacha'?800:400);
}

/* ===== Undo / Reset ===== */
function undo(){
  if(S.drawing||$('attendPanel').classList.contains('show'))return;
  const last=S.called.pop();
  if(!last){toast('暂无可撤回');return}
  S.remaining.push(last);S.remaining.sort((a,b)=>a.no-b.no);
  const ri=S.attendance.findIndex(r=>r.no===last.no);if(ri>=0)S.attendance.splice(ri,1);
  S.callCounts[last.no]=Math.max(0,(S.callCounts[last.no]||1)-1);
  $('winnerName').textContent=last.name;
  $('winnerNo').textContent='已撤回 #'+String(last.no).padStart(2,'0');
  $('winnerOverlay').classList.add('show');
  render();toast('已撤回 '+last.name);
}

function reset(){
  if(S.drawing||$('attendPanel').classList.contains('show'))return;
  if(!confirm('确定要重置吗？所有考勤数据将清除。'))return;
  S.remaining=[...students];S.called=[];S.attendance=[];S.rosterState={'morning':{},'am1':{},'pm1':{},'evening':{},'night1':{}};
  students.forEach(s=>S.callCounts[s.no]=0);
  $('winnerOverlay').classList.remove('show');
  $('drawBtn').textContent='✦ 开始抽取';
  render();toast('已重置');
}

/* ===== Attendance ===== */
document.querySelectorAll('.attendBtn').forEach(btn=>{
  btn.onclick=function(){
    if(!S.pendingWinner)return;
    const status=this.dataset.s;
    S.attendance.push({no:S.pendingWinner.no,name:S.pendingWinner.name,status,time:timeStr(),date:dateStr()});
    // Sync to attendanceRecords for history/export
    const key=S.currentDate+'_'+S.currentPeriod;
    if(!S.attendanceRecords[key])S.attendanceRecords[key]={};
    S.attendanceRecords[key][S.pendingWinner.no]=status;
    const labels={present:'出勤',late:'迟到',absent:'缺勤',leave:'请假'};
    toast(S.pendingWinner.name+' · '+labels[status]);
    $('attendPanel').classList.remove('show');
    S.pendingWinner=null;render();
    DataSync.triggerAutoSync();
  }
});

/* ===== Stats ===== */
function showStats(){
  const sorted=students.slice().sort((a,b)=>(S.callCounts[b.no]||0)-(S.callCounts[a.no]||0));

const ROSTER_STATES=['','present','late','absent','leave'];
const ROSTER_LABELS={'':'\u2014','present':'\u2705','late':'\u23f0','absent':'\u274c','leave':'\ud83d\udcdd'};
function renderRoster(){
  const list=$('rosterList');if(!list)return;
  if(!S.rosterState[S.currentPeriod])S.rosterState[S.currentPeriod]={};
  const periodState=S.rosterState[S.currentPeriod];
  const leaveMap={};
  S.leaveRecords.filter(r=>r.startDate===S.currentDate).forEach(r=>{
    if(r.periods&&r.periods.length>0){
      const periodName=(ATTENDANCE_PERIODS.find(p=>p.id===S.currentPeriod)||{}).name||'';
      if(r.periods.some(p=>p.includes('\u5168\u5929')||p.includes('\u4e00\u5929')||p===periodName||p==='')){
        leaveMap[r.studentNo]=r;
      }
    }else{
      leaveMap[r.studentNo]=r;
    }
  });
  list.innerHTML=students.map(s=>{
    const st=periodState[s.no]||'';
    const leave=leaveMap[s.no];
    const leaveTag=leave?'<span style="font-size:10px;color:var(--blue);margin-left:4px">\ud83d\udd12'+leave.type+'</span>':'';
    return '<div class="rosterItem" data-no="'+s.no+'"><span class="rno">'+s.no+'</span><span class="rname">'+s.name+leaveTag+'</span><span class="rbadge '+st+'">'+(ROSTER_LABELS[st]||'\u2014')+'</span></div>';
  }).join('');
  list.onclick=function(e){
    const item=e.target.closest('.rosterItem');if(!item)return;
    const no=parseInt(item.dataset.no);
    const cur=periodState[no]||'';
    const curPeriodName=(ATTENDANCE_PERIODS.find(p=>p.id===S.currentPeriod)||{}).name||'';
    const hasRealLeave=S.leaveRecords.some(r=>{
      if(r.studentNo!==no||r.startDate!==S.currentDate)return false;
      if(r.periods&&r.periods.length>0)return r.periods.some(p=>p.includes('\u5168\u5929')||p.includes('\u4e00\u5929')||p===curPeriodName||p==='');
      return true;
    });
    if(hasRealLeave){
      if(cur!=='leave'){
        periodState[no]='leave';
        const k=S.currentDate+'_'+S.currentPeriod;
        if(!S.attendanceRecords[k])S.attendanceRecords[k]={};
        S.attendanceRecords[k][no]='leave';
        renderRoster();return;
      }
      toast('\ud83d\udd12 \u8be5\u540c\u5b66\u6709\u8bf7\u5047\u8bb0\u5f55\uff0c\u72b6\u6001\u5df2\u9501\u5b9a');return;
    }
    const idx=ROSTER_STATES.indexOf(cur);
    const next=ROSTER_STATES[(idx+1)%ROSTER_STATES.length];
    if(next)periodState[no]=next;else delete periodState[no];
    const key=S.currentDate+'_'+S.currentPeriod;
    if(!S.attendanceRecords[key])S.attendanceRecords[key]={};
    if(next)S.attendanceRecords[key][no]=next;else delete S.attendanceRecords[key][no];
    if(next==='absent'){
      const result=checkAbsence(no,S.currentDate,S.currentPeriod);
      if(result.type==='absent'){showAbsenceNotification(result);speak(result.studentName+'\u540c\u5b66\uff0c\u8bf7\u95ee\u4f60\u5728\u5417\uff1f');}
    }
    renderRoster();
  };
  renderRosterSide();
}

/* ===== Leave Message Parser ===== */
const LEAVE_PARSER = {
  findStudents(text) {
    const found = [];
    for (const s of students) {
      if (text.includes(s.name)) found.push(s);
    }
    const fuzzyPatterns = [
      /(?:我家|孩子|女儿|儿子|同学)([\u4e00-\u9fa5]{2,4})/,
      /([\u4e00-\u9fa5]{2,4})(?:妈妈|爸爸|家长|祖父|祖母)/
    ];
    for (const pat of fuzzyPatterns) {
      const m = text.match(pat);
      if (m) {
        const name = m[1];
        const s = students.find(s => s.name === name || s.name.includes(name));
        if (s && !found.find(f => f.no === s.no)) found.push(s);
      }
    }
    return found;
  },
  findType(text) {
    if (/发烧|感冒|肚子疼|不舒服|看医生|住院|骨折|生病|发热|咳嗽|拉肚子/.test(text)) return '病假';
    if (/比赛|活动|开会|代表学校|竞赛|培训/.test(text)) return '公假';
    return '事假';
  },
  findDate(text) {
    const today = new Date();
    if (/今天|今日/.test(text)) return today.toISOString().split('T')[0];
    if (/明天|明日/.test(text)) { const d = new Date(today); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; }
    if (/后天/.test(text)) { const d = new Date(today); d.setDate(d.getDate()+2); return d.toISOString().split('T')[0]; }
    const dm = text.match(/(\d{1,2})[月.](\d{1,2})[日号]?/);
    if (dm) { const y = today.getFullYear(); return `${y}-${String(parseInt(dm[1])).padStart(2,'0')}-${String(parseInt(dm[2])).padStart(2,'0')}`; }
    return today.toISOString().split('T')[0];
  },
  findPeriods(text) {
    if (/一天|全天|整[天日]/.test(text)) return ['早读','下午第1节','晚读'];
    if (/上午|早上|早自习|早读/.test(text)) return ['早读'];
    if (/下午|中午|午/.test(text)) return ['下午第1节'];
    if (/晚上|晚自习|晚读/.test(text)) return ['晚读','晚自习'];
    if (/半天/.test(text)) return ['早读','下午第1节'];
    return ['全天'];
  },
  calcConfidence(students, type, text) {
    let s = 0;
    if (students.length > 0) s++;
    if (type !== '事假') s++;
    if (/今天|明天|后天/.test(text)) s++;
    if (text.length > 10) s++;
    if (/(?:因为|由于|请假)/.test(text)) s++;
    return Math.min(5, s);
  },
  parse(text) {
    const foundStudents = this.findStudents(text);
    const type = this.findType(text);
    const date = this.findDate(text);
    const periods = this.findPeriods(text);
    const confidence = this.calcConfidence(foundStudents, type, text);
    return { students: foundStudents, type, startDate: date, endDate: date, periods, reason: this.extractReason(text), confidence, rawText: text, parsedAt: new Date().toISOString() };
  },
  extractReason(text) {
    const m = text.match(/(?:因为|由于|原因是?)[：:]?\s*(.+)/);
    if (m) return m[1].substring(0, 50);
    const m2 = text.match(/(发烧[\d.]*度?|感冒|肚子疼|骨折|住院)/);
    if (m2) return m2[0];
    return '';
  }
};

/* ===== Excel导入导出学生名单 ===== */
function importStudents() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data);
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
      const newStudents = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (row[0] && row[1]) {
          newStudents.push({
            no: parseInt(row[0]) || i,
            name: String(row[1]),
            gender: String(row[2] || ''),
            phone: String(row[3] || '')
          });
        }
      }
      if (newStudents.length === 0) {
        toast('未找到有效学生数据');
        return;
      }
      students.length = 0;
      newStudents.forEach(s => students.push(s));
      S.remaining = [...students];
      S.called = [];
      S.rosterState = {'morning':{},'am1':{},'pm1':{},'evening':{},'night1':{}};
      S.attendanceRecords = {};
      S.callCounts = {};
      autoSave();
      render();
      toast('✅ 已导入 ' + newStudents.length + ' 名学生');
    } catch(err) {
      toast('导入失败: ' + err.message);
    }
  };
  input.click();
}

function toggleManualForm(){ const f=document.getElementById('leaveManualForm'); if(f) f.style.display=f.style.display==='none'?'block':'none'; }

function parseLeaveText() {
  const input = document.getElementById('leaveTextInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) { toast('请先粘贴请假消息'); return; }
  
  // Batch mode: split by double newline
  const messages = text.split(/\n\n+/).filter(m => m.trim().length > 5);
  if (messages.length > 1) {
    window._batchResults = messages.map(msg => LEAVE_PARSER.parse(msg.trim()));
    showBatchResults();
    return;
  }
  
  const result = LEAVE_PARSER.parse(text);
  window._lastParseResult = result;
  const resultDiv = document.getElementById('leaveParseResult');
  const contentDiv = document.getElementById('leaveParseContent');
  if (!resultDiv || !contentDiv) return;
  const stars = '★'.repeat(result.confidence) + '☆'.repeat(5-result.confidence);
  const names = result.students.map(s=>s.name).join('、') || '未识别';
  contentDiv.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">'+
    '<div><span style="color:var(--text2)">学生：</span><b style="color:var(--gold)">'+names+'</b></div>'+
    '<div><span style="color:var(--text2)">假别：</span><b>'+result.type+'</b></div>'+
    '<div><span style="color:var(--text2)">日期：</span><b>'+result.startDate+'</b></div>'+
    '<div><span style="color:var(--text2)">时段：</span><b>'+result.periods.join('、')+'</b></div>'+
    '<div style="grid-column:1/-1"><span style="color:var(--text2)">置信度：</span><span style="color:var(--gold)">'+stars+'</span></div>'+
    '</div>'+
    '<div style="margin-top:8px;padding:8px;background:var(--elevated);border-radius:8px;font-size:16px;color:var(--text3)">📋 '+text.substring(0,100)+'</div>';
  resultDiv.style.display = 'block';
}

function confirmLeave() {
  const result = window._lastParseResult;
  if (!result || !result.students.length) { toast('未识别到学生，请手动填写'); return; }
  for (const student of result.students) {
    S.leaveRecords.push({ id: Date.now()+'_'+student.no, studentNo: student.no, studentName: student.name, type: result.type, startDate: result.startDate, endDate: result.endDate, periods: result.periods, reason: result.reason, source: 'paste', rawText: result.rawText, submittedAt: new Date().toISOString(), status: 'approved' });
    // 自动同步考勤状态为请假
    if(!S.rosterState[S.currentPeriod])S.rosterState[S.currentPeriod]={};
    S.rosterState[S.currentPeriod][student.no] = 'leave';
    const key = S.currentDate + '_' + S.currentPeriod;
    if (!S.attendanceRecords[key]) S.attendanceRecords[key] = {};
    S.attendanceRecords[key][student.no] = 'leave';
  }
  toast('✅ 请假已提交，考勤已同步');
  renderLeaveRecords();
  renderRoster();
  document.getElementById('leaveTextInput').value = '';
  document.getElementById('leaveParseResult').style.display = 'none';
  DataSync.triggerAutoSync();
}

function submitManualLeave() {
  const studentNo = parseInt(document.getElementById('leaveStudent').value);
  const student = students.find(s => s.no === studentNo);
  if (!student) return;
  S.leaveRecords.push({ id: Date.now()+'_'+student.no, studentNo: student.no, studentName: student.name, type: document.getElementById('leaveType').value, startDate: document.getElementById('leaveDate').value, endDate: document.getElementById('leaveDate').value, periods: [document.getElementById('leavePeriod').value], reason: document.getElementById('leaveReason').value || '', source: 'manual', rawText: '', submittedAt: new Date().toISOString(), status: 'approved' });
  // 自动同步考勤状态为请假
  if(!S.rosterState[S.currentPeriod])S.rosterState[S.currentPeriod]={};
  S.rosterState[S.currentPeriod][student.no] = 'leave';
  const key = S.currentDate + '_' + S.currentPeriod;
  if (!S.attendanceRecords[key]) S.attendanceRecords[key] = {};
  S.attendanceRecords[key][student.no] = 'leave';
  toast('✅ 请假已提交，考勤已同步');
  renderLeaveRecords();
  renderRoster();
  document.getElementById('leaveManualForm').style.display = 'none';
  DataSync.triggerAutoSync();
}

function renderLeaveRecords() {
  const list = document.getElementById('leaveRecordsList');
  if (!list) return;
  const today = S.leaveRecords.filter(r => r.startDate === S.currentDate);
  if (today.length === 0) { list.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px;font-size:13px">今日暂无请假记录</div>'; return; }
  list.innerHTML = today.map(r =>
    '<div style="background:var(--surface);border-radius:8px;padding:8px 10px;border:1px solid var(--border);font-size:12px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center"><b>'+r.studentName+'</b>'+
    '<span style="background:'+(r.type==='病假'?'var(--coral)':r.type==='公假'?'var(--blue)':'var(--gold)')+';color:#fff;padding:1px 6px;border-radius:4px;font-size:16px">'+r.type+'</span></div>'+
    '<div style="color:var(--text2);margin-top:2px">'+r.periods.join('、')+' · '+(r.reason||'无备注')+'</div>'+
    '<div style="color:var(--text3);font-size:16px;margin-top:2px">'+(r.source==='paste'?'📋 粘贴识别':'✏️ 手动填写')+' · '+new Date(r.submittedAt).toLocaleTimeString('zh-CN')+'</div></div>'
  ).reverse().join('');
}

function clearLeaveInput() {
  const i=document.getElementById('leaveTextInput'); if(i) i.value='';
  const r=document.getElementById('leaveParseResult'); if(r) r.style.display='none';
}

function editLeave() {
  const result = window._lastParseResult;
  if (!result) return;
  document.getElementById('leaveManualForm').style.display = 'block';
  if (result.students.length > 0) document.getElementById('leaveStudent').value = result.students[0].no;
  document.getElementById('leaveType').value = result.type;
  document.getElementById('leaveDate').value = result.startDate;
  document.getElementById('leaveReason').value = result.reason;
}


/* ===== History Query ===== */
function renderHistory(){
  const datesDiv=$('historyDates');const contentDiv=$('historyContent');
  if(!datesDiv||!contentDiv)return;

  const dates=Object.keys(S.attendanceRecords).map(k=>k.split('_')[0]).filter((v,i,a)=>a.indexOf(v)===i).sort().reverse();

  if(dates.length===0){
    datesDiv.innerHTML='';
    contentDiv.innerHTML='<div style="color:var(--text3);text-align:center;padding:40px;font-size:16px">暂无考勤记录</div>';
    return;
  }

  datesDiv.innerHTML=dates.map(d=>
    '<div class="historyDateItem'+(d===S.currentDate?' active':'')+'" onclick="showHistoryDate(\''+d+'\')">'+d+'</div>'
  ).join('');

  showHistoryDate(dates[0]);
}

function showHistoryDate(date){
  document.querySelectorAll('.historyDateItem').forEach(el=>el.classList.toggle('active',el.textContent===date));
  const contentDiv=$('historyContent');if(!contentDiv)return;

  const statusEmoji={present:'✅',late:'迟到',absent:'缺勤',leave:'请假'};
  const statusClass={present:'statusPresent',late:'statusLate',absent:'statusAbsent',leave:'statusLeave'};

  const datePeriods=[];
  ATTENDANCE_PERIODS.forEach(p=>{
    const key=date+'_'+p.id;
    if(S.attendanceRecords[key]&&Object.keys(S.attendanceRecords[key]).length>0){
      datePeriods.push({key,period:p});
    }
  });

  if(datePeriods.length===0){
    const leaves=S.leaveRecords.filter(r=>r.startDate===date);
    if(leaves.length>0){
      let html='<h3 style="margin-bottom:8px">'+date+' 请假记录</h3>';
      html+='<table class="historyTable"><tr><th>学号</th><th>姓名</th><th>假别</th><th>时段</th><th>原因</th></tr>';
      leaves.forEach(r=>{
        html+='<tr><td>'+r.studentNo+'</td><td>'+r.studentName+'</td><td>'+r.type+'</td><td>'+r.periods.join('、')+'</td><td>'+(r.reason||'-')+'</td></tr>';
      });
      html+='</table>';
      contentDiv.innerHTML=html;
    }else{
      contentDiv.innerHTML='<div style="color:var(--text3);text-align:center;padding:40px;font-size:16px">'+date+' 无考勤记录</div>';
    }
    return;
  }

  let html='<table style="width:100%;border-collapse:collapse;font-size:12px">';
  html+='<thead><tr>';
  html+='<th style="text-align:left;padding:6px;border-bottom:2px solid var(--border)">姓名</th>';
  datePeriods.forEach(dp=>{
    html+='<th style="padding:6px;border-bottom:2px solid var(--border);text-align:center">'+dp.period.name+'</th>';
  });
  html+='</tr></thead><tbody>';

  students.forEach(s=>{
    const hasLeave=S.leaveRecords.some(r=>r.studentNo===s.no&&r.startDate===date);
    html+='<tr>';
    html+='<td style="padding:4px 6px">'+s.name+'</td>';
    datePeriods.forEach(dp=>{
      if(hasLeave){
        html+='<td style="text-align:center;background:rgba(91,141,239,.12)" class="statusLeave">请假</td>';
      }else{
        const records=S.attendanceRecords[dp.key]||{};
        const st=records[s.no];
        if(st){
          const cls=statusClass[st]||'';
          const label=statusEmoji[st]||st;
          if(st==='present'){
            html+='<td style="text-align:center">'+label+'</td>';
          }else{
            html+='<td style="text-align:center" class="'+cls+'">'+label+'</td>';
          }
        }else{
          html+='<td style="text-align:center;color:var(--text3)">—</td>';
        }
      }
    });
    html+='</tr>';
  });

  html+='</tbody></table>';
  contentDiv.innerHTML=html;
}


/* ===== Excel Export ===== */
function exportExcel(){
  if(typeof XLSX==='undefined'){toast('Excel库未加载，使用CSV导出');exportCSV();return;}
  
  const wb=XLSX.utils.book_new();
  
  // Sheet 0: Summary - stats across ALL dates
  const summaryData=[
    ['\u661f\u8fb0\u73ed\u52a1 \u2014 \u8003\u52e4\u7edf\u8ba1\u62a5\u544a'],
    [''],
    ['\u72b6\u6001', '\u4eba\u6570', '\u6bd4\u4f8b'],
    ['\u2705 \u51fa\u52e4', 0, ''],
    ['\u23f0 \u8fdf\u5230', 0, ''],
    ['\u274c \u7f3a\u52e4', 0, ''],
    ['\ud83d\udcdd \u8bf7\u5047', 0, '']
  ];

  // Count across ALL dates
  const totalCounts = {present:0, late:0, absent:0, leave:0};
  Object.values(S.attendanceRecords).forEach(periodRecords => {
    Object.values(periodRecords).forEach(v => {
      if(totalCounts[v] !== undefined) totalCounts[v]++;
    });
  });
  const total = Object.values(totalCounts).reduce((a,b)=>a+b, 0);
  summaryData[3][1] = totalCounts.present;
  summaryData[3][2] = total > 0 ? Math.round(totalCounts.present/total*100)+'%' : '0%';
  summaryData[4][1] = totalCounts.late;
  summaryData[4][2] = total > 0 ? Math.round(totalCounts.late/total*100)+'%' : '0%';
  summaryData[5][1] = totalCounts.absent;
  summaryData[5][2] = total > 0 ? Math.round(totalCounts.absent/total*100)+'%' : '0%';
  summaryData[6][1] = totalCounts.leave;
  summaryData[6][2] = total > 0 ? Math.round(totalCounts.leave/total*100)+'%' : '0%';
  
  const ws0 = XLSX.utils.aoa_to_sheet(summaryData);
  XLSX.utils.book_append_sheet(wb, ws0, '\u7edf\u8ba1\u6458\u8981');
  
  // Sheet 1: 学生名单
  const studentData=[['学号','姓名','性别','家长电话']];
  students.forEach(s=>studentData.push([s.no,s.name,'','']));
  const ws1=XLSX.utils.aoa_to_sheet(studentData);
  XLSX.utils.book_append_sheet(wb,ws1,'学生名单');
  
  // Sheet 2: 考勤记录 - ALL dates
  const allDates = [...new Set(Object.keys(S.attendanceRecords).map(k => k.split('_')[0]))].sort();
  if (allDates.length === 0) allDates.push(S.currentDate); // fallback

  const enabledPeriods = ATTENDANCE_PERIODS.filter(p => PeriodConfig.isEnabled(p.id));
  const data = [];

  // Header row: 姓名 | 05-05 早读 | 05-05 上午第1节 | ... | 出勤率
  const header = ['姓名'];
  allDates.forEach(d => {
    enabledPeriods.forEach(p => {
      header.push(d.substring(5) + ' ' + p.name);
    });
  });
  header.push('出勤率');
  data.push(header);

  // Data rows
  students.forEach(s => {
    const row = [s.name];
    let totalRecords = 0;
    let presentCount = 0;
    allDates.forEach(d => {
      const hasLeave = S.leaveRecords.some(r => r.studentNo === s.no && r.startDate === d);
      if (hasLeave) {
        enabledPeriods.forEach(() => row.push('请假'));
      } else {
        enabledPeriods.forEach(p => {
          const key = d + '_' + p.id;
          const records = S.attendanceRecords[key] || {};
          const status = records[s.no] || '';
          row.push({present:'出勤',late:'迟到',absent:'缺勤',leave:'请假'}[status] || '');
          if (status) {
            totalRecords++;
            if (status === 'present') presentCount++;
          }
        });
      }
    });
    const rate = totalRecords > 0 ? Math.round(presentCount / totalRecords * 100) + '%' : '';
    row.push(rate);
    data.push(row);
  });

  if(data.length>1){
    const ws2=XLSX.utils.aoa_to_sheet(data);
    XLSX.utils.book_append_sheet(wb,ws2,'考勤记录');
  }
  
  // Sheet 3: 请假记录
  if(S.leaveRecords.length>0){
    const leaveData=[['日期','学号','姓名','假别','时段','原因','来源','提交时间']];
    S.leaveRecords.forEach(r=>leaveData.push([r.startDate,r.studentNo,r.studentName,r.type,r.periods.join('、'),r.reason||'',r.source==='paste'?'粘贴识别':'手动填写',new Date(r.submittedAt).toLocaleString('zh-CN')]));
    const ws3=XLSX.utils.aoa_to_sheet(leaveData);
    XLSX.utils.book_append_sheet(wb,ws3,'请假记录');
  }
  
  // Download
  const filename='星辰班务_考勤数据_'+new Date().toISOString().split('T')[0]+'.xlsx';
  XLSX.writeFile(wb,filename);
  toast('✅ 已导出 '+filename);
}

/* ===== Voice TTS ===== */
const VOICE_CONFIG = { enabled: true, rate: 1.0, volume: 0.8, voice: null };
function initVoice() {
  if (!window.speechSynthesis) return;
  const loadVoices = () => {
    const voices = speechSynthesis.getVoices();
    VOICE_CONFIG.voice = voices.find(v => v.lang.includes('zh')) || voices[0];
  };
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}
initVoice();

function speak(text, rate) {
  if (!VOICE_CONFIG.enabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = rate || VOICE_CONFIG.rate;
  u.volume = VOICE_CONFIG.volume;
  if (VOICE_CONFIG.voice) u.voice = VOICE_CONFIG.voice;
  speechSynthesis.speak(u);
}

function voiceCall() {
  const name = prompt('请输入学生姓名：');
  if (!name) return;
  const reason = prompt('请输入要说什么（如：到办公室、来拿作业）：') || '请到办公室';

  speak(name + '同学，' + reason, 0.9);
  showCallBanner(name + '同学，' + reason);
}

function showCallBanner(text) {
  const old = document.getElementById('callBanner');
  if (old) old.remove();
  const banner = document.createElement('div');
  banner.id = 'callBanner';
  const callText = document.createElement('div');
  callText.className = 'call-text';
  callText.textContent = '📢 ' + text + '　　📢 ' + text;
  banner.appendChild(callText);
  banner.onclick = () => { speechSynthesis.cancel(); banner.remove(); };
  document.body.appendChild(banner);
  setTimeout(() => { if (banner.parentNode) banner.remove(); }, 10000);
}

/* ===== Absence Detection & Notification ===== */
function checkAbsence(studentNo, date, period) {
  const hasLeave = S.leaveRecords.some(r => r.studentNo === studentNo && r.startDate === date);
  if (hasLeave) return { type: 'leave', message: '' };
  const student = students.find(s => s.no === studentNo);
  const name = student ? student.name : '未知';
  const now = new Date();
  const periodName = (ATTENDANCE_PERIODS.find(p=>p.id===period)||{}).name || period;
  const msg = name + '家长您好，' + name + '今天' + periodName + '未到校，目前无请假记录。请确认孩子是否安全，如有特殊情况请回复。\n——班级智能助手';
  return { type: 'absent', message: msg, studentName: name, studentNo: studentNo, date: date, period: period, createdAt: now.toISOString() };
}

function markAbsentWithCheck(studentNo) {
  const result = checkAbsence(studentNo, S.currentDate, S.currentPeriod);
  if (result.type === 'leave') {
    toast('\u26a0\ufe0f ' + students.find(s=>s.no===studentNo).name + ' 已有请假记录');
    return;
  }
  const key = S.currentDate + '_' + S.currentPeriod;
  if (!S.attendanceRecords[key]) S.attendanceRecords[key] = {};
  S.attendanceRecords[key][studentNo] = 'absent';
  showAbsenceNotification(result);
  speak(result.studentName + '同学，请问你在吗？');
  renderRoster();
}

function showAbsenceNotification(result) {
  const existing = document.getElementById('absenceNotify');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'absenceNotify';
  div.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:999;background:var(--card);border:2px solid var(--coral);border-radius:16px;padding:16px 20px;box-shadow:0 8px 32px rgba(0,0,0,.4);max-width:360px;animation:slideInBottom .3s ease';
  div.innerHTML = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
    '<span style="font-size:32px">\u26a0\ufe0f</span>' +
    '<b style="font-size:18px;color:var(--coral)">缺勤通知</b>' +
    '<button onclick="this.parentElement.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px">\u2715</button>' +
    '</div>' +
    '<div style="font-size:13px;line-height:1.6;color:var(--text)">' + result.message.replace(/\n/g, '<br>') + '</div>' +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
    '<button class="btn btn-primary" style="flex:1;height:34px;font-size:12px" onclick="copyNotification(this)">\ud83d\udccb 复制通知</button>' +
    '<button class="btn btn-secondary" style="height:34px;font-size:12px" onclick="confirmContacted(this)">\u2713 已通知</button>' +
    '<button class="btn" style="height:34px;font-size:12px;background:var(--elevated);color:var(--text2)" onclick="ignoreNotification(this)">忽略</button>' +
    '</div>';
  document.body.appendChild(div);
  div._data = result;
}

function copyNotification(btn) {
  const div = btn.closest('#absenceNotify');
  if (!div || !div._data) return;
  navigator.clipboard.writeText(div._data.message).then(() => {
    toast('\u2705 通知已复制到剪贴板');
    btn.textContent = '\u2713 已复制';
    btn.disabled = true;
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = div._data.message;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    toast('\u2705 通知已复制');
    btn.textContent = '\u2713 已复制';
  });
}

function confirmContacted(btn) {
  const div = btn.closest('#absenceNotify');
  if (div) { toast('\u2705 已标记为已通知家长'); div.remove(); }
}

function ignoreNotification(btn) {
  const div = btn.closest('#absenceNotify');
  if (div) div.remove();
}

  style.id = 'notifyAnimStyle';
  style.textContent = '@keyframes slideInBottom{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}';

}

/* ===== Period Configuration ===== */
const PeriodConfig = {
  // 时段配置存储在localStorage
  storageKey: 'starclass_period_config',
  
  // 获取当前配置（哪些时段启用）
  getConfig: function() {
    try {
      const saved = localStorage.getItem(this.storageKey);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    // 默认全部启用
    return {
      morning: true,
      am1: true,
      night1: true,
      pm1: true,
      evening: true
    };
  },
  
  // 保存配置
  saveConfig: function(config) {
    localStorage.setItem(this.storageKey, JSON.stringify(config));
    renderPeriodBar(); // 刷新时段栏
    toast('✅ 时段配置已保存');
  },
  
  // 切换时段启用状态
  togglePeriod: function(periodId) {
    const config = this.getConfig();
    config[periodId] = !config[periodId];
    this.saveConfig(config);
  },
  
  // 获取启用的时段列表
  getEnabledPeriods: function() {
    const config = this.getConfig();
    return ATTENDANCE_PERIODS.filter(p => config[p.id] !== false);
  },
  
  // 判断时段是否启用
  isEnabled: function(periodId) {
    const config = this.getConfig();
    return config[periodId] !== false;
  },

  // 从编辑器保存名称和时间
  saveFromEditor: function() {
    const nameInputs = document.querySelectorAll('.periodNameInput');
    const timeInputs = document.querySelectorAll('.periodTimeInput');
    nameInputs.forEach((input, i) => {
      if (ATTENDANCE_PERIODS[i]) {
        ATTENDANCE_PERIODS[i].name = input.value || ATTENDANCE_PERIODS[i].name;
        ATTENDANCE_PERIODS[i].time = timeInputs[i].value || ATTENDANCE_PERIODS[i].time;
      }
    });
    localStorage.setItem('starclass_periods', JSON.stringify(ATTENDANCE_PERIODS));
    renderPeriodBar();
  },

  // 恢复默认配置
  resetDefaults: function() {
    ATTENDANCE_PERIODS = DEFAULT_PERIODS.map(p => ({...p}));
    localStorage.removeItem('starclass_periods');
    document.querySelector('.modal.show')?.remove();
    showPeriodConfig();
  }
};
