name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 星星班务-Windows
          path: dist/*.exe
          retention-days: 30
